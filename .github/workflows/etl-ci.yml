name: ETL pipeline (real stack)

on:
  push:
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run the pipeline end-to-end
        run: |
          set -e
          if ls *.zip >/dev/null 2>&1; then unzip -o *.zip -d _unzipped >/dev/null; fi
          DIR="$(dirname "$(find . -name docker-compose.yml | head -1)")"
          echo "Project dir: $DIR"
          cd "$DIR"
          cp .env.example .env || true
          chmod -R a+rX .
          mkdir -p "$GITHUB_WORKSPACE/_artifacts"
          docker compose build
          docker compose up -d postgres mongo airflow-init
          for i in $(seq 1 40); do
            docker compose exec -T postgres pg_isready -U airflow >/dev/null 2>&1 && break || sleep 3
          done
          docker compose up -d airflow-scheduler airflow-webserver
          sleep 15
          docker compose run --rm mongo-seed
          docker compose exec -T airflow-scheduler airflow dags unpause mongo_to_postgres_etl || true
          docker compose exec -T airflow-scheduler airflow dags trigger mongo_to_postgres_etl
          ok=0
